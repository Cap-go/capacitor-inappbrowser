appId: app.capgo.inappbrowser
---
- extendedWaitUntil:
    visible: "InAppBrowser Test App"
    timeout: 20000
- extendedWaitUntil:
    visible: "Open Auto Download Demo"
    timeout: 20000
- tapOn: "Open Auto Download Demo"
- extendedWaitUntil:
    visible: ".*capgo-download-demo.*\\.txt"
    timeout: 30000
- assertVisible: ".*Capgo download demo successful.*InAppBrowser\\..*"
