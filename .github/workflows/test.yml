name: Build source code and test it

on:
  push:
    branches:
      - renovate/**
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call: # Allow this workflow to be called by other workflows

jobs:
  guard_swiftpm_version:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Enforce capacitor-swift-pm version
        run: |
          set -euo pipefail
          if ! grep -Eq 'https://github.com/ionic-team/capacitor-swift-pm\.git"[[:space:]]*,[[:space:]]*from:[[:space:]]*"8\.0\.0"' Package.swift; then
            echo "Expected capacitor-swift-pm to be pinned to 8.0.0 in Package.swift"
            exit 1
          fi

  build_android:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Build
        id: build_code
        run: bun run verify:android

  maestro_android_proxy_regression:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
      - name: Install root dependencies
        run: bun i
      - name: Setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Install Maestro CLI
        run: |
          export MAESTRO_VERSION=1.39.0
          curl -fsSL "https://get.maestro.mobile.dev" | bash
      - name: Build example app for Android regression flow
        run: bun run example-app:prepare:android
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Maestro proxy regression
        uses: ReactiveCircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          disable-animations: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: sh ./scripts/run-android-maestro-with-retry.sh

  maestro_android_example_app:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    name: Android example app Maestro smoke
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
        with:
          node-version: 24
      - name: Install root dependencies
        run: bun i
      - name: Setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Install Maestro CLI
        run: |
          export MAESTRO_VERSION=1.39.0
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Build plugin and example app
        run: |
          bun run build
          cd example-app
          bun install
          bun run build
          bunx cap sync android
      - name: Assemble Android example app
        run: cd example-app/android && ./gradlew assembleDebug
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Maestro smoke test
        uses: ReactiveCircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: CAPGO_MAESTRO_SKIP_BUILD=1 bun run test:maestro:android
      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: maestro-results-android
          path: maestro-results
  maestro_android_blank_target_regression:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
      - name: Install root dependencies
        run: bun i
      - name: Setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Install Maestro CLI
        run: |
          export MAESTRO_VERSION=1.39.0
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Build example app for Android blank target flow
        run: bun run example-app:prepare:android
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Maestro blank target regression
        uses: ReactiveCircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: sh ./scripts/run-android-maestro-with-retry.sh maestro:test:android:blank-target
      - name: Upload Maestro blank target artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: maestro-android-blank-target-artifacts
          path: |
            maestro-artifacts
            maestro-report.xml

  maestro_android_keyboard_regression:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
      - name: Install root dependencies
        run: bun i
      - name: Setup java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Install Maestro CLI
        run: |
          export MAESTRO_VERSION=1.39.0
          curl -fsSL "https://get.maestro.mobile.dev" | bash
      - name: Build example app for Android regression flow
        run: bun run example-app:prepare:android
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Maestro keyboard regression
        uses: ReactiveCircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          disable-animations: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: sh ./scripts/run-android-maestro-with-retry.sh maestro:test:android:keyboard
  maestro_ios_proxy_regression:
    timeout-minutes: 45
    runs-on: macos-latest
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
      - name: Install root dependencies
        run: bun i
      - name: Install Maestro CLI
        run: |
          export MAESTRO_VERSION=1.39.0
          curl -fsSL "https://get.maestro.mobile.dev" | bash
      - name: Build example app for iOS regression flow
        run: bun run example-app:prepare:ios
      - name: Select iOS Simulator
        run: |
          xcrun simctl shutdown all || true
          IOS_SIMULATOR_UDID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')
          if [ -z "$IOS_SIMULATOR_UDID" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          echo "IOS_SIMULATOR_UDID=$IOS_SIMULATOR_UDID" >> "$GITHUB_ENV"
      - name: Build and install iOS example app
        run: |
          open -a Simulator --args -CurrentDeviceUDID "$IOS_SIMULATOR_UDID"
          xcrun simctl boot "$IOS_SIMULATOR_UDID" || true
          xcrun simctl bootstatus "$IOS_SIMULATOR_UDID" -b
          xcodebuild \
            -project example-app/ios/App/App.xcodeproj \
            -scheme App \
            -destination "id=$IOS_SIMULATOR_UDID" \
            -derivedDataPath example-app/ios/DerivedData \
            build
          xcrun simctl install "$IOS_SIMULATOR_UDID" example-app/ios/DerivedData/Build/Products/Debug-iphonesimulator/App.app
          xcrun simctl launch "$IOS_SIMULATOR_UDID" app.capgo.inappbrowser || true
      - name: Run Maestro proxy regression
        run: |
          export MAESTRO_DRIVER_STARTUP_TIMEOUT=300000
          for attempt in 1 2; do
            open -a Simulator --args -CurrentDeviceUDID "$IOS_SIMULATOR_UDID"
            xcrun simctl boot "$IOS_SIMULATOR_UDID" || true
            xcrun simctl bootstatus "$IOS_SIMULATOR_UDID" -b
            xcrun simctl launch "$IOS_SIMULATOR_UDID" app.capgo.inappbrowser || true
            if $HOME/.maestro/bin/maestro test -e APP_ID=app.capgo.inappbrowser example-app/.maestro/proxy-regression.yaml; then
              exit 0
            fi
            if [ "$attempt" -eq 2 ]; then
              exit 1
            fi
            echo "Maestro iOS run failed. Restarting simulator and retrying once..."
            xcrun simctl terminate "$IOS_SIMULATOR_UDID" app.capgo.inappbrowser || true
            xcrun simctl shutdown "$IOS_SIMULATOR_UDID" || true
            sleep 5
          done

  build_ios:
    timeout-minutes: 30
    runs-on: macOS-latest
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Build
        id: build_code
        run: bun run verify:ios

  web:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    name: 'Build code and test'
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Lint
        id: lint_code
        run: bun run lint
      - name: Build
        id: build_code
        run: bun run build
      - name: Verify
        id: verify_code
        run: bun run verify:web
