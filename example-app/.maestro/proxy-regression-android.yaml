appId: ${APP_ID}
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Run Maestro Proxy"
    timeout: 240000
- tapOn:
    text: "Run Maestro Proxy"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: "Proxy regression passed"
    timeout: 180000
- assertVisible: "Script loaded | Fetch OK | XHR OK"
- assertNotVisible: "Proxy regression failed"
