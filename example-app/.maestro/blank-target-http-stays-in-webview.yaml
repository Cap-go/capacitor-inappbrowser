appId: ${APP_ID}
name: Blank target HTTPS links stay in the current webview
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: true
- tapOn:
    text: "Wait"
    optional: true
    label: "Dismiss the transient Pixel Launcher ANR dialog before waiting for the harness"
- extendedWaitUntil:
    visible: "Maestro Ready"
    timeout: 240000
- tapOn:
    text: "Wait"
    optional: true
    label: "Dismiss the transient Pixel Launcher ANR dialog when it appears"
- scrollUntilVisible:
    element: "Open Blank Target HTTPS Test"
    direction: DOWN
    timeout: 20000
    centerElement: true
- tapOn:
    text: "Open Blank Target HTTPS Test"
    retryTapIfNoChange: true
- assertVisible: "Target Blank Test Page"
- tapOn:
    text: "Open Example Domain"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: "Example Domain"
    timeout: 15000
- tapOn:
    id: "app.capgo.inappbrowser:id/closeButton"
    label: "Close the plugin webview"
- extendedWaitUntil:
    visible: ".*internal navigation confirmed.*"
    timeout: 15000
- assertVisible: ".*Closed.*"
- assertVisible: ".*internal navigation confirmed.*"
- assertVisible: ".*https://example.com/#blank-target-webview.*"
