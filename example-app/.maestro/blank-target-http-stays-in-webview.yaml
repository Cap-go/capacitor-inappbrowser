appId: ${APP_ID}
name: Blank target HTTPS links stay in the current webview
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: true
- tapOn:
    text: "Wait"
    optional: true
    label: "Dismiss the transient Pixel Launcher ANR dialog before waiting for the harness"
- launchApp:
    clearState: false
- tapOn:
    text: "Wait"
    optional: true
    label: "Dismiss the transient Pixel Launcher ANR dialog after relaunching the harness"
- repeat:
    times: 16
    while:
      notVisible: "Maestro Ready"
    commands:
      - tapOn:
          text: "Wait"
          optional: true
          label: "Dismiss the transient Pixel Launcher ANR dialog while waiting for the harness"
      - extendedWaitUntil:
          visible: "Maestro Ready"
          timeout: 15000
          optional: true
- repeat:
    times: 4
    commands:
      - tapOn:
          text: "Wait"
          optional: true
          label: "Dismiss the transient Pixel Launcher ANR dialog after the harness is ready"
- extendedWaitUntil:
    visible: "Maestro Ready"
    timeout: 15000
- tapOn:
    id: "maestro-run-blank-target"
    retryTapIfNoChange: true
- assertVisible: "Target Blank Test Page"
- tapOn:
    text: "Open Example Domain"
    retryTapIfNoChange: true
- tapOn:
    text: "Wait"
    optional: true
    label: "Dismiss the transient Pixel Launcher ANR dialog after opening the blank target link"
- extendedWaitUntil:
    visible: "Example Domain"
    timeout: 15000
- tapOn:
    id: "app.capgo.inappbrowser:id/closeButton"
    label: "Close the plugin webview"
- extendedWaitUntil:
    visible: "Blank target regression passed"
    timeout: 15000
