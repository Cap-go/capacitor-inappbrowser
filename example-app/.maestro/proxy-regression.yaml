appId: ${APP_ID}
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "InAppBrowser Test App"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Run Proxy Regression Test"
    direction: DOWN
    timeout: 30000
    visibilityPercentage: 50
- assertVisible: "Run Proxy Regression Test"
- tapOn:
    text: "Run Proxy Regression Test"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: "Proxy regression passed"
    timeout: 60000
- scroll
- assertVisible: "Script loaded | Fetch OK | XHR OK"
- assertNotVisible: "Proxy regression failed"
