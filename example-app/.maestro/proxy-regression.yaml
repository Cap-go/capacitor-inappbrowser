appId: ${APP_ID}
---
- launchApp:
    clearState: true
- repeat:
    times: 8
    commands:
      - tapOn:
          text: "Wait"
          optional: true
          retryTapIfNoChange: true
      - extendedWaitUntil:
          visible: "Proxy regression passed"
          timeout: 30000
          optional: true
- tapOn:
    text: "Wait"
    optional: true
- assertNotVisible:
    text: "Proxy regression failed"
    optional: true
- assertVisible: "Proxy regression passed"
