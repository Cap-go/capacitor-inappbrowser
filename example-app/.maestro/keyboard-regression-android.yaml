appId: ${APP_ID}
---
- extendedWaitUntil:
    visible: "Maestro Ready"
    timeout: 240000
- tapOn:
    id: "maestro-run-keyboard"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: "Keyboard Regression Page"
    timeout: 120000
- tapOn:
    id: "keyboard-input"
    retryTapIfNoChange: true
- runFlow:
    when:
      visible: "Don't allow"
    commands:
      - tapOn: "Don't allow"
- extendedWaitUntil:
    visible: "Dismiss Keyboard"
    timeout: 30000
- tapOn:
    text: "Dismiss Keyboard"
    retryTapIfNoChange: true
- tapOn:
    text: "Close Browser"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: "Keyboard regression passed"
    timeout: 120000
