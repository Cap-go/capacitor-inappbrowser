appId: ${APP_ID}
androidWebViewHierarchy: devtools
---
- extendedWaitUntil:
    visible: "Maestro Ready"
    timeout: 240000
- tapOn:
    id: "maestro-run-keyboard"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: "Keyboard Regression Page"
    timeout: 120000
- tapOn:
    id: "keyboard-input"
    retryTapIfNoChange: true
- inputText: "keyboard regression"
- runFlow:
    when:
      visible: "Don't allow"
    commands:
      - tapOn: "Don't allow"
- extendedWaitUntil:
    visible: "Keyboard regression passed"
    timeout: 120000
