<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>InAppBrowser Test App</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <script
      type="module"
      src="https://unpkg.com/@ionic/pwa-elements@latest/dist/ionicpwaelements/ionicpwaelements.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/@ionic/pwa-elements@latest/dist/ionicpwaelements/ionicpwaelements.js"
    ></script>

    <link rel="icon" type="image/x-icon" href="./assets/icon/favicon.ico" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./css/style.css" />
    <meta name="theme-color" content="#31d53d" />
  </head>
  <body>
    <div
      id="maestro-controls"
      style="padding: 12px; border-bottom: 1px solid #d8e1ff; background: #f4f7ff; color: #1b1f3b; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;"
    >
      <div id="maestro-ready-banner" style="font-weight: 700;">Maestro Booting</div>
      <div style="margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap;">
        <button
          id="maestro-run-proxy"
          disabled
          style="padding: 10px 12px; border: 0; border-radius: 6px; background: #5b39f7; color: #fff; font-size: 14px;"
        >
          Run Proxy Regression (Maestro)
        </button>
      </div>
      <div id="maestro-proxy-status" style="margin-top: 8px; font-size: 14px;">Not started</div>
      <div id="maestro-proxy-details" style="margin-top: 4px; font-size: 13px; white-space: pre-wrap;"></div>
    </div>
    <capacitor-welcome></capacitor-welcome>

    <script src="./js/capacitor-welcome.js" type="module"></script>
  </body>
</html>
